<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Teacher Wynn's Master Smartboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/drag-drop-touch/1.1.0/dragdroptouch.min.js"></script>

    <style>
        :root {
            --color-pink: #ffccd5;
            --color-purple: #8e44ad;
            --pure-white: #ffffff;
            --bg-side: #f7f1fb;
            --color-yellow: #FFD93D;
        }

        body {
            margin: 0;
            font-family: "Comic Sans MS", cursive, sans-serif;
            background-image: url('background.jpg'); 
            background-size: cover;
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            touch-action: none;
        }

        /* --- BIGGER TEXT & SMARTBOARD UI --- */
        .taiwan-clock {
            position: absolute; top: 15px; left: 15px; background: white; 
            padding: 15px 40px; border-radius: 50px; border: 6px solid var(--color-yellow);
            font-weight: 900; font-size: 36px; font-variant: small-caps; z-index: 1000;
        }

        .main-view { height: 75vh; display: flex; justify-content: center; align-items: center; padding: 10px; z-index: 5; }
        
        .content-card {
            display: none; background: var(--pure-white); width: 98%; height: 98%; 
            border-radius: 60px; border: 15px solid var(--color-yellow);
            position: relative; overflow: hidden;
        }
        .content-card.active { display: flex; }

        .side-tabs { width: 220px; background: var(--bg-side); display: flex; flex-direction: column; padding: 20px; gap: 15px; border-right: 8px solid var(--color-pink); }
        .side-btn {
            flex: 1; border: none; background: white; cursor: pointer; font-family: inherit; font-weight: 900; 
            font-size: 38px; writing-mode: vertical-rl; transform: rotate(180deg); text-align: center; 
            border-radius: 30px; font-variant: small-caps; border: 4px solid #eee;
        }
        .side-btn.active { background: var(--color-purple); color: white; }

        .card-body { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .section-title { font-size: 100px; color: var(--color-purple); font-weight: 900; font-variant: small-caps; text-align: center; z-index: 10; }

        /* --- ASSETS --- */
        .jar-display { 
            width: 500px; height: 450px; background-image: url('jar_image.png');
            background-size: contain; background-repeat: no-repeat; background-position: bottom;
            display: flex; flex-wrap: wrap; align-content: flex-end; justify-content: center; padding: 30px;
        }
        .gif-large { width: 500px; height: 350px; object-fit: contain; border: 10px solid var(--color-pink); border-radius: 40px; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* --- NAVIGATION --- */
        .nav-container { height: 20vh; display: flex; justify-content: center; align-items: center; gap: 30px; background: rgba(255,255,255,0.8); border-top: 10px solid var(--color-yellow); }
        .tab-btn { 
            background: white; color: var(--color-purple); border: 8px solid var(--color-purple);
            padding: 25px 60px; cursor: pointer; font-family: inherit; font-size: 45px; 
            font-weight: 900; border-radius: 40px; box-shadow: 0 12px 0px var(--color-purple); font-variant: small-caps;
        }
        .tab-btn.active { background: var(--color-purple); color: white; transform: translateY(12px); box-shadow: none; }

        /* --- WIDGETS --- */
        .widget-launcher { position: absolute; right: 20px; top: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
        .icon-btn { width: 90px; height: 90px; background: white; border: 6px solid var(--color-purple); border-radius: 50%; font-size: 45px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .fullscreen-btn { position: absolute; bottom: 20px; left: 20px; width: 90px; height: 90px; background: var(--color-yellow); border-radius: 20px; font-size: 45px; border: none; cursor: pointer; z-index: 2000; }
    </style>
</head>
<body onclick="handlePosterLoop()">

    <div class="taiwan-clock" id="clock">Taiwan: --:--:--</div>
    <button class="fullscreen-btn" onclick="toggleFS()">📺</button>

    <div class="widget-launcher">
        <button class="icon-btn" onclick="toggleWin('win-draw')">✏️</button>
        <button class="icon-btn" onclick="toggleWin('win-pick')">🎲</button>
        <button class="icon-btn" onclick="toggleWin('win-time')">⏲️</button>
    </div>

    <div class="main-view">
        <div id="main-card" class="content-card">
            <div class="side-tabs" id="sidebar"></div>
            <div class="card-body" id="content-body"></div>
        </div>
    </div>

    <div class="nav-container">
        <button class="tab-btn" onclick="openNav(event, 'greetings')">Greetings</button>
        <button class="tab-btn" onclick="openNav(event, 'warmup')">Warm-up</button>
        <button class="tab-btn" onclick="openNav(event, 'review')">Review</button>
        <button class="tab-btn" onclick="openNav(event, 'learning')">Learning</button>
        <button class="tab-btn" onclick="openNav(event, 'ready')">Ready</button>
        <button class="tab-btn" onclick="openNav(event, 'exit')">Exit</button>
    </div>

    <script>
        let currentTab = '';
        let currentSub = '';
        let posterIdx = 0;
        const posters = ['image_d6e469.jpg', 'poster2.jpg', 'poster3.jpg'];
        const quizList = [
            {w:'swim', a:'listen_swim.mp3', g:'swim.gif'}, {w:'jump', a:'listen_jump.mp3', g:'jump.gif'},
            {w:'read', a:'listen_read.mp3', g:'read.gif'}, {w:'write', a:'listen_write.mp3', g:'write.gif'},
            {w:'sing', a:'listen_sing.mp3', g:'sing.gif'}, {w:'dance', a:'listen_dance.mp3', g:'dance.gif'},
            {w:'draw', a:'listen_draw.mp3', g:'draw.gif'}
        ];

        function openNav(e, id) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            currentTab = id;
            const sidebar = document.getElementById('sidebar');
            
            const menu = {
                'greetings': [['Hi', 'hi'], ['Weather', 'weather'], ['Feeling', 'jar']],
                'warmup': [['Intro', 'win-in'], ['Quiz 2', 'q2']],
                'review': [['Words', 'rev-words']],
                'learning': [['Airport', 'airport'], ['Posters', 'posters']],
                'ready': [['Ready', 'ready-video']],
                'exit': [['Bye', 'exit-video']]
            };

            sidebar.innerHTML = menu[id].map(m => `<button class="side-btn" onclick="switchSub(event, '${m[1]}')">${m[0]}</button>`).join('');
            switchSub(null, menu[id][0][1]);
            document.getElementById('main-card').style.display = 'flex';
        }

        function switchSub(e, sub) {
            currentSub = sub;
            const body = document.getElementById('content-body');
            body.innerHTML = '';
            if(e) { document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active')); e.currentTarget.classList.add('active'); }

            if(sub === 'hi') body.innerHTML = `<h1 class="section-title">Good Afternoon!</h1>`;
            if(sub === 'weather') body.innerHTML = `<h2 class="section-title">How's the weather?</h2><div style="display:flex;gap:40px;"><div class="side-btn" style="writing-mode:horizontal-tb; transform:none; height:auto; padding:20px;" draggable="true" ondragstart="drag(event)">☀️ Sunny</div><div class="side-btn" style="writing-mode:horizontal-tb; transform:none; height:auto; padding:20px;" draggable="true" ondragstart="drag(event)">🌧️ Rainy</div></div><div id="dz" ondrop="dropWeather(event)" ondragover="event.preventDefault()" style="width:500px;height:150px;border:10px dashed #ccc;margin-top:50px;border-radius:40px;"></div>`;
            if(sub === 'jar') body.innerHTML = `<h2 class="section-title">How are you?</h2><div style="display:flex;gap:60px;margin-bottom:30px;"><div style="font-size:120px;cursor:grab;" draggable="true" ondragstart="drag(event)" data-type="happy">😊</div><div style="font-size:120px;cursor:grab;" draggable="true" ondragstart="drag(event)" data-type="sad">😢</div></div><div class="jar-display" ondrop="dropJar(event)" ondragover="event.preventDefault()"></div>`;
            if(sub === 'q2') loadListeningQuiz();
            if(sub === 'rev-words') body.innerHTML = `<h1 class="section-title" style="font-size:150px;">Vocabulary</h1><img src="swim.gif" class="gif-large">`;
            if(sub === 'airport') body.innerHTML = `<video class="video-overlay" autoplay loop muted src="airport_vibe.mp4"></video><h1 class="section-title" style="position:relative; color:white; text-shadow:5px 5px 15px #000;">Airport</h1>`;
            if(sub === 'posters') { posterIdx = 0; showPoster(); }
            if(sub === 'ready-video') body.innerHTML = `<video class="video-overlay" autoplay loop muted src="ready_vibe.mp4"></video><h1 class="section-title" style="position:relative; color:white;">Ready?</h1>`;
            if(sub === 'exit-video') body.innerHTML = `<video class="video-overlay" autoplay loop muted src="exit_vibe.mp4"></video><h1 class="section-title" style="position:relative; color:white;">Goodbye!</h1>`;
        }

        function loadListeningQuiz() {
            const item = quizList[Math.floor(Math.random()*quizList.length)];
            window.audioObj = new Audio(item.a);
            const opts = [item, ...quizList.filter(v=>v.w!==item.w).sort(()=>0.5-Math.random()).slice(0,2)].sort(()=>0.5-Math.random());
            document.getElementById('content-body').innerHTML = `<h2 class="section-title">Listen & Pick</h2><button class="tab-btn" onclick="audioObj.play()">🔊 Play Sound</button><div style="display:flex;gap:40px;margin-top:50px;">${opts.map(o=>`<div onclick="checkQuiz('${o.w}','${item.w}')" style="cursor:pointer;text-align:center;"><img src="${o.g}" class="gif-large" style="width:300px;height:250px;"><p style="font-size:60px;font-weight:900;">${o.w.toUpperCase()}</p></div>`).join('')}</div>`;
        }

        function checkQuiz(p, r) { if(p===r) { new Audio('correct.mp3').play(); setTimeout(loadListeningQuiz, 1500); } }
        
        function showPoster() { document.getElementById('content-body').innerHTML = `<img src="${posters[posterIdx]}" style="height:95%; border:15px solid var(--color-purple); border-radius:40px; z-index:10;">`; }
        
        function handlePosterLoop() { if(currentSub === 'posters') { posterIdx = (posterIdx + 1) % posters.length; showPoster(); } }

        function toggleFS() { 
            if(!document.fullscreenElement) document.documentElement.requestFullscreen(); 
            else if (document.exitFullscreen) document.exitFullscreen(); 
        }

        function drag(ev) { 
            ev.dataTransfer.setData("text", ev.target.innerText); 
            ev.dataTransfer.setData("emoji", ev.target.innerText); 
            ev.dataTransfer.setData("type", ev.target.dataset.type); 
        }

        function dropJar(ev) { 
            ev.preventDefault(); 
            const s = document.createElement("span"); 
            s.innerText=ev.dataTransfer.getData("emoji"); 
            s.style.fontSize="100px"; 
            ev.target.appendChild(s); 
        }

        function dropWeather(ev) { 
            ev.preventDefault(); 
            document.getElementById('dz').innerHTML = `<h1 style="font-size:70px;text-align:center;">${ev.dataTransfer.getData("text")}</h1>`; 
        }

        setInterval(() => {
            const options = { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('clock').innerText = "Taiwan: " + new Intl.DateTimeFormat('en-US', options).format(new Date());
        }, 1000);
    </script>
</body>
</html>
